name: Build and Deploy testng_node1

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: testng-node1
  ECS_SERVICE: testng-node1-service
  ECS_CLUSTER: testng-node1-cluster
  CONTAINER_NAME: testng-node1
  TF_WORKING_DIR: terraform

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Test
  # ─────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: